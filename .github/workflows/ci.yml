name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Test + Clippy (native, stable) ─────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo test (default features)
        run: cargo test --all-targets

      - name: cargo test (no default features)
        run: cargo test --no-default-features --lib --tests

      - name: cargo test (rayon only)
        run: cargo test --no-default-features --features rayon --lib --tests

      - name: cargo test (native integration gate)
        run: cargo test --no-default-features --features __native --lib --tests

      - name: cargo clippy
        # Deny all clippy lints except pre-existing style/unused issues.
        run: >
          cargo clippy --all-targets --
          -D clippy::correctness
          -D clippy::suspicious
          -A clippy::all

  # ── Bench build check (no harness run) ─────────────────────────────────────
  bench-build:
    name: Bench build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-bench-

      - name: cargo build --benches
        run: cargo build --benches

      - name: check benchmark baseline manifest
        run: scripts/check_benchmark_manifest.sh

      - name: prepare perf baseline from main
        if: github.event_name == 'pull_request'
        run: |
          # Prefer the CI-generated artifact baseline (more reproducible than
          # the in-repo file which may lag behind main).
          # Falls back to git-fetching the in-repo baseline from origin/main.
          echo "Trying to download perf-guard-baseline-main artifact via gh CLI..."
          if command -v gh &>/dev/null && gh artifact download perf-guard-baseline-main \
              --repo "$GITHUB_REPOSITORY" \
              --dir benches/artifact_baseline 2>/dev/null; then
            ARTIFACT_FILE="$(find benches/artifact_baseline -name 'PERF_GUARD_BASELINE.txt' | head -n1)"
            if [[ -n "$ARTIFACT_FILE" ]]; then
              cp "$ARTIFACT_FILE" benches/PERF_GUARD_BASELINE_MAIN.txt
              echo "PERF_GUARD_BASELINE_PATH=$PWD/benches/PERF_GUARD_BASELINE_MAIN.txt" >> "$GITHUB_ENV"
              echo "Using CI artifact baseline: $ARTIFACT_FILE"
            fi
          else
            git fetch --depth=1 origin main
            if git show origin/main:benches/PERF_GUARD_BASELINE.txt > benches/PERF_GUARD_BASELINE_MAIN.txt 2>/dev/null; then
              echo "PERF_GUARD_BASELINE_PATH=$PWD/benches/PERF_GUARD_BASELINE_MAIN.txt" >> "$GITHUB_ENV"
              echo "Using git-sourced in-repo baseline from origin/main"
            else
              echo "main branch baseline not found; fallback to repository baseline"
            fi
          fi

      - name: perf guard (warning only)
        continue-on-error: true
        env:
          PERF_GUARD_TOLERANCE: "0.60"
          PERF_GUARD_TOLERANCE_MAP: "spmv_1d_n5000_p50_ms=0.45,spmv_1d_n5000_p95_ms=0.70,cg_1d_n1000_p50_ms=0.55,cg_1d_n1000_p95_ms=0.80"
          PERF_GUARD_BASELINE_PATH: ${{ env.PERF_GUARD_BASELINE_PATH }}
        run: scripts/check_perf_guard.sh

      - name: upload benchmark baseline manifest
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline-manifest
          path: benches/BASELINE_MANIFEST.txt

      - name: upload perf guard report
        uses: actions/upload-artifact@v4
        with:
          name: perf-guard-report
          path: |
            benches/PERF_GUARD_BASELINE.txt
            benches/PERF_GUARD_BASELINE_MAIN.txt
            benches/PERF_GUARD_REPORT.txt
            benches/PERF_GUARD_CURRENT.txt

  # ── WASM cross-compile ──────────────────────────────────────────────────────
  wasm:
    name: WASM cross-compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-wasm-

      - name: cargo build --target wasm32 (no-default-features + wasm feature)
        run: >
          cargo build
          --target wasm32-unknown-unknown
          --no-default-features
          --features wasm
          --lib

  # ── Perf baseline update (runs only on push to main) ───────────────────────
  # Generates a fresh perf-guard baseline from the current main HEAD and uploads
  # it as a GitHub Actions artifact named "perf-guard-baseline-main".
  # Pull-request checks (bench-build job) will download this artifact as the
  # reference baseline instead of relying on the file checked in to the repo,
  # giving CI-to-CI comparison that accounts for host variance over time.
  perf-baseline-update:
    name: Update perf baseline (main)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-perf-baseline-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-perf-baseline-

      - name: Generate perf baseline
        run: cargo run --release --example perf_guard --quiet > benches/PERF_GUARD_BASELINE.txt

      - name: Upload perf baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: perf-guard-baseline-main
          path: benches/PERF_GUARD_BASELINE.txt
          # Keep for 90 days so PRs opened months later still have a reference.
          retention-days: 90
